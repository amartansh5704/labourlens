version: "3.8"

services:

  # ── Qdrant Vector Database ─────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: laborlens_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data: